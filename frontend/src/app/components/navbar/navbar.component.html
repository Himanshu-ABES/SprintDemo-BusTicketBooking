<style>
  .ios-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245, 240, 232, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(10,10,10,0.06);
    padding: 0 24px;
  }

  .ios-nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 64px;
  }

  .ios-nav-links {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .ios-nav-link {
    padding: 8px 16px;
    border-radius: var(--radius-full);
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--ink-light);
    transition: var(--transition);
    text-decoration: none;
    cursor: pointer;
  }

  .ios-nav-link:hover {
    background: rgba(10,10,10,0.05);
    color: var(--ink);
    opacity: 1;
  }

  .ios-nav-user {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--ink);
    padding: 6px 14px;
    background: var(--cream-dark);
    border-radius: var(--radius-full);
    margin-right: 4px;
  }

  .ios-nav-logout {
    padding: 8px 18px;
    border-radius: var(--radius-full);
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--ink-muted);
    background: transparent;
    border: 1.5px solid rgba(10,10,10,0.12);
    cursor: pointer;
    transition: var(--transition);
    font-family: var(--font);
  }

  .ios-nav-logout:hover {
    background: var(--ink);
    color: var(--white);
    border-color: var(--ink);
  }
</style>

<nav class="ios-nav">
  <div class="ios-nav-inner">
    <div class="ios-nav-links">

      <!-- Not Logged In -->
      <ng-container *ngIf="!authService.isLoggedIn()">
        <a class="ios-nav-link" routerLink="/login">Login</a>
        <a class="ios-btn ios-btn-primary ios-btn-sm" routerLink="/register">Register</a>
      </ng-container>

      <!-- Logged In -->
      <ng-container *ngIf="authService.isLoggedIn()">
        <a class="ios-nav-link" routerLink="/home">Search</a>
        <a class="ios-nav-link" routerLink="/my-bookings">My Bookings</a>
        <span class="ios-nav-user">{{ authService.getCustName() }}</span>
        <button class="ios-nav-logout" (click)="logout()">Logout</button>
      </ng-container>

    </div>

  </div>
</nav>
